name: Feature request
description: Suggest a new channel, configuration option, or improvement
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who feels the pain today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Sketches, config examples, and feed-spec links are very welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, other modules, or third-party tools.
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New channel / marketplace
        - Configuration option
        - Performance
        - Developer experience
        - Documentation
        - Other
    validations:
      required: true
