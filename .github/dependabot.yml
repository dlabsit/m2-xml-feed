version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - composer
    commit-message:
      prefix: "chore(deps)"
    groups:
      magento-coding-standard:
        patterns:
          - "magento/magento-coding-standard"
      phpstan:
        patterns:
          - "phpstan/*"
          - "bitexpert/phpstan-magento"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Amsterdam"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"
