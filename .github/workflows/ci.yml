name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  phpcs:
    name: PHP ${{ matrix.php }} - phpcs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2, cs2pr
          coverage: none
          ini-values: memory_limit=512M

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: PHP syntax check
        run: find . -path ./vendor -prune -o -name "*.php" -print0 | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Allow phpcodesniffer-composer-installer plugin
        run: composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true

      - name: Install Magento Coding Standard
        run: composer global require --no-progress --no-interaction magento/magento-coding-standard:^32

      - name: Run phpcs (Magento Coding Standard)
        run: |
          PHPCS_BIN="$HOME/.composer/vendor/bin/phpcs"
          "$PHPCS_BIN" --standard=Magento2 --severity=8 --extensions=php,phtml --report=checkstyle . | cs2pr
